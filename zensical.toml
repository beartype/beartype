# --------------------( SYNOPSIS                           )--------------------
# Project-wide Zensical configuration, applied to all invocations of the
# Zensical documentation generator within this project -- including both by
# directly running the external "zensical" command locally and by indirectly
# running that command remotely from GitHub Actions-based documentation
# workflows.
#
# --------------------( COMMANDS                           )--------------------
# Commonly used Zensical commands include:
#     # Add a default Zensical documentation tree to the current project:
#     cd ~/py/${PROJECT_NAME}
#     zensical new .
#
#     # Locally test the current Zensical documentation tree:
#     zensical serve
#
#     # Remotely build to the "_site/" output subdirectory:
#     zensical build

# ....................{ TODO                                }...................
#FIXME: Define all remaining relevant configuration options specified here:
#    https://zensical.org/docs/setup/basics/

#FIXME: Pretty sure we need to include "black" in the "doc-ghp" extra. Why?
#Because "mkdocstrings-python" appears to optionally require that in common edge
#cases we will definitely hit. See also:
#    https://mkdocstrings.github.io/python/usage/configuration/signatures/#line_length

#FIXME: Enable some combination of "mkdocs-autoapi" and/or "mkdocs-api-autonav"
#to auto-generate an API reference. Maybe? @beartype is kinda non-trivial, but
#it would also be unfortunate if we had to do this manually. Research us up!

# ....................{ CORE                                }...................
[project]

# Human-readable name of the static site generated by Zensical.
site_name = "Beartype"

# Human-readable description of this site, injected as a proper HTML-compliant
# "<meta...>" tag into the HTML header of each site page.
site_description = "Unbearably fast near-real-time hybrid runtime-static type-checking in pure Python."

# Human-readable name(s) of the author(s) of this site.
site_author = "Beartype"

# Human-readable copyright line, typically injected into each page by the
# third-party theme configured below.
copyright = "Copyright (c) 2014-2026 Beartype authors."

# URL of the repository documented by this site.
repo_url = "https://github.com/beartype/beartype"

# ....................{ PATHS                               }...................
# Relative or absolute dirname of the top-level Zensical-specific input
# subdirectory documenting this repository with Zensical-specific markdown.
docs_dir = "docs"

# Relative or absolute dirname of the top-level Zensical-specific output
# subdirectory storing all web-compliant files (e.g., HTML, CSS, JavaScript)
# generated by the "zensical build" subcommand required to render this site.
#
# Note that this dirname intentionally corresponds to the Jekyll-specific
# output dirname leveraged by our ".github/workflows/python_docs.yml" workflow.
site_dir = "_site"

# ....................{ JAVASCRIPT                          }...................
# List of all JavaScript-specific files required by this site. See also:
#     https://zensical.org/docs/authoring/math/
extra_javascript = [
  # MathJax-specific JavaScript files. See also "pymdownx.arithmatex" below.
  "docs/js/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

# ....................{ NAVIGATION                          }...................
# Site-wide navigation tree. When defined, Zensical uses this explicitly rather
# than auto-discovering pages from the "docs/" subtree. See also:
#     https://zensical.org/docs/setup/navigation/
nav = [
  {Welcome = "index.md"},
  {Install = "install.md"},
  {"tl;dr" = "tldr.md"},
  {ELI5 = "eli5.md"},
  {API = [
    {Overview = "api.md"},
    {Decorators = "api_decor.md"},
    {Validators = "api_vale.md"},
    {Claws = "api_claw.md"},
    {DOOR = "api_door.md"},
    {Exceptions = "api_roar.md"},
  ]},
  {Features = "pep.md"},
  {Code = "code.md"},
  {Math = "math.md"},
  {FAQ = "faq.md"},

  #FIXME: *OMG*! "Moar" would be such an appropriate page title for this: e.g.,
  #    {"Moar" = "moar.md"},
  {"See Also" = "moar.md"},
]

# ....................{ MARKDOWN                            }...................
# Map of all Markdown extensions required by this site. See also:
#     https://zensical.org/docs/setup/extensions/about/
[project.markdown_extensions]

# Standard Python-Markdown extensions. See also:
#     https://python-markdown.github.io/extensions

# Admonition blocks (e.g., "!!! note", "!!! warning"). See also:
#     https://zensical.org/docs/authoring/admonitions/
admonition = {}

# HTML attribute injection via "{: .class #id }" syntax. Required by several
# Material features (e.g., image alignment, button styling). See also:
#     https://squidfunk.github.io/mkdocs-material/reference/images
attr_list = {}

# Footnote support via "[^1]" / "[^1]: ..." syntax. See also:
#     https://python-markdown.github.io/extensions/footnotes
footnotes = {}

# GFM-style pipe tables (required since Python-Markdown doesn't enable them
# by default). See also:
#     https://python-markdown.github.io/extensions/tables
tables = {}

# Enable permalinks that appear as paragraph marks next to headings
toc = {permalink = true}

# PyMdown Extensions. See also:
#     https://facelessuser.github.io/pymdown-extensions

# MathJax Markdown extension, enabling MathJax-rendered math to be embedded in
# Markdown with standard math syntax (e.g., LaTeX).
#
# Note that a competing KaTeX Markdown extension also exists, but that this
# MathJax Markdown extension is widely considered to be superior.
#
# See also:
#   https://zensical.org/docs/authoring/math/
"pymdownx.arithmatex" = {generic = true}

# Fenced code blocks with language labels and (optionally) embedded diagrams.
# Required for admonition blocks to nest fenced code inside them. See also:
#     https://facelessuser.github.io/pymdown-extensions/extensions/superfences
"pymdownx.superfences" = {}

# File-inclusion snippets, used here solely for its "auto_append" feature:
# automatically appending "docs/_links.md" to every page so that all Markdown
# reference-style link definitions in that file are globally available. This
# replicates the RST "_links.rst" / "rst_epilog" pattern. See also:
#     https://facelessuser.github.io/pymdown-extensions/extensions/snippets
"pymdownx.snippets" = {base_path = ["docs"], auto_append = ["_links.md"]}

# ....................{ PLUGINS                             }...................
# ....................{ PLUGINS ~ builtin                   }...................
# First-party Zensical plugins bundled with Zensical itself.

# Enable the builtin search bar, which the Material theme seamlessly
# integrates with. See also:
#     https://zensical.org/docs/setup/search/
[project.plugins.search]

# ....................{ PLUGINS ~ third-party               }...................
# Third-party Zensical plugins external to Zensical itself.

#FIXME: Uncomment if and when we leverage versioning for @beartype docs.
#[project.plugins.mike]
#canonical_version = "latest"
#deploy_prefix = "public"

# Automatically generate API reference documentation from Python docstrings
# embedded inside the Python package defined by this project. See also:
#     https://zensical.org/docs/setup/extensions/mkdocstrings/
[project.plugins.mkdocstrings.handlers.python]

# ....................{ PLUGINS ~ mkdocstrings ~ core       }...................
# List of all dirnames relative to this configuration file under which to
# discover documentation.
paths = ["."]

# List of all inventories (i.e., external URLs to Sphinx-formatted inventory
# files listing all Python attributes provided by the APIs hosted at those
# URLs). Third-party attributes provided by an inventory listed below will be
# implicitly linked to; all other third-party attributes will remain unlinked.
inventories = [
  # Official inventory providing:
  # * All Python builtins.
  # * The standard Python library.
  "https://docs.python.org/3/objects.inv",
  # Third-party inventory providing the NumPy API.
  "https://numpy.org/doc/stable/objects.inv",
]

# ....................{ PLUGINS ~ mkdocstrings ~ options    }...................
[project.plugins.mkdocstrings.handlers.python.options]

# Prefer NumpyDoc-style Python docstrings. By default, "mkdocstrings" assumes
# Google-style Python docstrings.
docstring_style = "numpy"

# Style used to render docstrings sections. Choices include:
# * "table": a simple table, usually with type, name and description columns.
# * "list": a simple list, akin to what you get with the ReadTheDocs Sphinx
#   theme.
# * "spacy": a poor implementation of the amazing tables in Spacy's
#   documentation. See also: https://spacy.io/api/doc
#
# Defaults to "table". Unsurprisingly, everyone prefers "spacy".
docstring_section_style = "spacy"

#!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# CAUTION: Synchronize this list with the corresponding "doc-ghp:" extra in
# our top-level "pyproject.toml" configuration.
#!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# List of one or more third-party "mkdocstrings-python" extensions to enable.
extensions = [
  # Expand the default "mkdocstrings-python" support for absolute
  # cross-references with additional support for relative cross-references.
  #
  # Note that "mkdocstrings-python" technically already provides out-of-the-box
  # support for relative cross-references -- but *ONLY* for paid subscribers.
  # We get it. Really, we do. Like, *REALLY* really. We're dead-broke, too.
  # But a well-maintained free-as-in-beer open-source alternative already
  # exists! It's hard to compete with free. Which is why @beartype doesn't go
  # there. Paid-only functionality only incentivizes competition.
  #
  # See also:
  # * Upstream documentation:
  #     https://analog-garage.github.io/mkdocstrings-python-xref
  # * Comparable paid "mkdocstrings-python" functionality:
  #     https://mkdocstrings.github.io/python/usage/configuration/docstrings/#relative_crossrefs
  "mkdocstrings-python-xref",
]

# ....................{ PLUGINS ~ mkdocstrings ~ heading    }...................
# See also:
#   https://mkdocstrings.github.io/python/usage/configuration/headings

# Show one heading for each grouped category (i.e., kind of similar attribute)
# defined by a submodule.
show_category_heading = true

# Show classnames as headings. By default, classnames are hidden.
# That makes no sense, Zensical. Nobody wants that! *sigh*
show_root_heading = true

# Prefix headings by Sphinx-style domain names disambiguating the kinds of
# those headings:
# * "attr" for attributes.
# * "class" for classes.
# * "func" for functions.
# * "meth" for methods.
# * "mod" for modules.
show_symbol_type_heading = true

# Prefix headings by the same names in the Table of Contents (ToC).
show_symbol_type_toc = true

# ....................{ PLUGINS ~ mkdocstrings ~ members    }...................
# See also:
#   https://mkdocstrings.github.io/python/usage/configuration/members

# Show attributes inherited into subclasses by their superclasses.
inherited_members = true

# ....................{ PLUGINS ~ mkdocstrings ~ signature  }...................
# See also:
#   https://mkdocstrings.github.io/python/usage/configuration/signatures

# Show callable signatures of all @typing.overload-decorated callables in code
# blocks below headers.
show_overloads = true

# Hide the implementation signature of overloaded callables, defined as the
# signature associated with the overloaded callable containing a non-empty body
# and *NOT* decorated by the PEP 484-compliant @typing.overload decorator.
overloads_only = true

# Show callable signatures in code blocks below headers. By default, callable
# signatures are embedded in headers. Since signatures commonly contain type
# hints and parameters, this unwise default commonly results in overly verbose
# and unreadable headers.
separate_signature = true

# Show both type hints and parameters in signatures. Naturally, both are
# disabled by default. *sigh*
show_signature_annotations = true
show_signature_type_parameters = true

#FIXME: This might be accessible only to paid subscribers. No idea!
# Show cross-references to type hints in signatures.
signature_crossrefs = true

# ....................{ THEME                               }...................
# Third-party Zensical UI theme currently employed by this project.
[project.theme]

# Material for Zensical. The one. The only. See also:
#     https://zensical.org/docs/setup/basics/
name = "material"

# Relative dirname of the theme overrides subdirectory, used to inject
# site-wide content (e.g., the announcement banner in "main.html"). See also:
#     https://zensical.org/docs/customization/
custom_dir = "overrides"

# FIXME: Specified as a remote URL because...erm...we're not sure anymore. In
# the first attempt to create an .ico, it ended up being more than 50k (lots of
# different sizes in that thar icon, I tellya) and we wanted to avoid repo
# bloat. But now, it's a svelte 8k .svg. Maybe we should just copy it here?
favicon = "https://raw.githubusercontent.com/beartype/beartype-assets/main/favicon.svg"

# Theme-specific features.
features = [
  # . See:
  #    https://zensical.org/docs/setup/navigation/#navigation-expansion-with-expansion
  "navigation.expand",

  # Displays content changes without page reloads (i.e., behaves like
  # a single-page app). See:
  #     https://zensical.org/docs/setup/navigation/#instant-navigation
  "navigation.instant",
  "navigation.instant.progress",

  # Adds prev/next navigation links at the bottom of each page. See:
  #     https://zensical.org/docs/setup/footer/#navigation.
  "navigation.footer",

  # Enable search highlighting, dynamically displaying all occurrences
  # of the search term in each found document.
  "search.highlight",

  # Enable search suggestions, dynamically displaying the likeliest
  # completion for the last word which can be accepted with the
  # <Right> arrow key.
  "search.suggest",

  #FIXME: Seems useful, but let's research this a bit more, please.
  # "navigation.tabs",
]

# Theme-specific color scheme(s). See also:
# * https://zensical.org/docs/setup/colors/
# * https://zensical.org/docs/setup/logo-and-icons/
[project.theme.icon]
repo = "fontawesome/brands/github"

# Palette toggle for automatic mode.
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle = {icon = "lucide/sun-moon", name = "Switch to dark mode"}  # old icon: material/brightness-auto

# Palette toggle for dark mode.
# Note that "slate" is Material's name for its default dark mode. *sigh*
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle = {icon = "lucide/moon", name = "Switch to light mode"}  # old icon: material/weather-night

# Palette toggle for light mode.
# Note that "default" is Material's name for its default light mode. I know.
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle = {icon = "lucide/sun", name = "Switch to system preference"}  # old icon: material/brightness-7

[project.validation]
# Needed because docs/_links.md may contain link definitions that
# aren't actually used anywhere, but still belong in the corpus.
unused_definitions = false

# FIXME: https://github.com/zensical/zensical/issues/700 - Snippets
# [and other things] recognized as unresolved link reference. This is
# necessary to build under --strict until that issue is fixed.
unresolved_references = false
